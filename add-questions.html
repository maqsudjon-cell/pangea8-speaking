const $ = id => document.getElementById(id);
const QUESTIONS = [{"part": 1, "topic": "Always In Use", "text": "1. Work and Studies, Schools and Workplaces", "cue": "1. Do you work or are you a student?\n2. What work do you do? / What subjects are you studying?\n3. Why did you choose that job?\n4. Why did you choose to study that subject?\n5. Do you like your job?\n6. Is there anything you dislike about your job?\n7. What do you like about your studies?\n8. What do you dislike about your studies?\n9. What was your dream job when you were young?\n10. Have you changed your mind on your dream job?"}, {"part": 1, "topic": "Always In Use", "text": "2. Hometown, Area You Live In", "cue": "1. Please describe your hometown a little.\n2. What is your town well-known for?\n3. Do you like your hometown?\n4. Is that a big city or a small place?\n5. How long have you been living there?\n6. Do you think you will continue living there for a long time?\n7. Would you like to live in the countryside in the future?\n8. Have you ever lived in the countryside?\n9. Do you ever spend time in the countryside?\n10. What is the difference between living in the countryside and the city?\n11. What do people living in the countryside like to do?\n12. What do you like to do in the countryside?\n13. How has your town changed over the last 20 years?"}, {"part": 1, "topic": "Always In Use", "text": "3. Home and Accommodation", "cue": "1. What colour would you choose to paint the walls of your room?\n2. What colour would you never use in your home?\n3. Can you describe the place where you live?\n4. What kind of housing accommodation do you live in?\n5. What do you like about your flat?\n6. Which room does your family spend most of the time in?\n7. What can you see from the windows where you live?\n8. Do you prefer living in a house or a flat?\n9. What would you like to change in your flat?\n10. What do you dislike about your flat?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "4. Art", "cue": "1. Do you like modern art or traditional art?\n2. Do you like art?\n3. Have you ever visited an art gallery?\n4. Do you think it would be interesting for you to be an artist?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "5. Carrying Things", "cue": "1. What do you do if your item is heavy?\n2. When you go out what do you carry with you?\n3. When you go to different places, do you carry different kinds of things?\n4. What is the difference between the things you carry in the evening and in the morning?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "6. Shoes", "cue": "1. How often do you buy shoes?\n2. Have you ever bought shoes online?\n3. Do you like to wear shoes that are comfortable or good-looking?\n4. Do people like to wear shoes that are comfortable or good-looking?\n5. What is your favourite type of shoes?\n6. How much money do you usually spend on shoes?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "7. Plants", "cue": "1. Do you keep plants?\n2. Have you ever had a plant?\n3. Do you know anything about growing a plant?\n4. What plants did you grow when you were younger?\n5. Do people in your country send plants as gifts?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "8. Noisy Places, Quiet Places", "cue": "1. Do you like quiet or noisy places?\n2. Would you like to go to quiet or noisy places on weekends when you are free?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "9. Public Places", "cue": "1. Have you ever talked with someone you don't know in public places?\n2. Do you wear headphones in public places?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "10. Having a Break", "cue": "1. What do you usually do during a break?\n2. What do you like to do during a break?\n3. How often do you take a break?\n4. Do you take a nap when you have a rest?\n5. How do you feel after taking a nap?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "11. Rules", "cue": "1. Are there any rules for students at your school?\n2. Do you think students would benefit more from more rules?\n3. Do you have a teacher who does his or her job very well?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "12. Museums", "cue": "1. What did you learn from visiting museums and art galleries?\n2. Do you think museums are important?\n3. Are there many museums in your hometown?\n4. Do you like visiting museums and art galleries?\n5. Do you often visit museums?\n6. When was the last time you visited a museum?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "13. Doing Something Well", "cue": "1. Have you ever had an experience where you did something well?\n2. Have you ever had an experience where your teacher thought you did a good job?\n3. Do you often tell your friends when they do something well?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "14. Dream Job, Plans for Future", "cue": "1. What was your dream job when you were young?\n2. Have you changed your mind on your dream job?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "15. Advertisements", "cue": "1. How do you feel about advertisements?\n2. Do you like advertisements?\n3. Do you like advertisements on TV?\n4. Is there much advertising in your country?\n5. What are the different places where we see advertisements?\n6. What advertising do you have in your country?\n7. Do you often see advertisements when you are on your phone or computer?\n8. What kind of advertising do you like?\n9. Do you see a lot of advertising on trains or other transport?\n10. Is there an advertisement that made an impression on you when you were a child?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "16. Borrowing and Lending Things", "cue": "1. Have you ever borrowed books from others?\n2. Have you ever borrowed money from others?\n3. Do you like to lend things to others?\n4. How do you feel when people don't return things they borrowed from you?\n5. Do you mind if others borrow money from you?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "17. Crowded Places", "cue": "1. Do most people like crowded places?\n2. Do you like crowded places?\n3. When was the last time you were in a crowded place?\n4. Is the city where you live crowded?\n5. Is there a crowded place near where you live?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "18. Sharing Things", "cue": "1. When you were a kid, did your parents encourage you to share things with others?\n2. Is there anything you don't want to share?\n3. What kind of things are not suitable for sharing?\n4. What kind of things do you like to share with others?\n5. Do you have anything to share with others?\n6. Who is the first person you would like to share good news with?\n7. What kind of news do you share with your friends?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "19. Fruits and Vegetables", "cue": "1. Do you think it's easy to grow vegetables?\n2. Should schools teach students how to grow vegetables?\n3. Are you interested in growing vegetables and fruits?\n4. Is growing vegetables popular in your country?\n5. Do many people grow vegetables in your city?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "20. Going Out, Cash", "cue": "1. How often do you use cash?\n2. Do you often bring cash with you?\n3. Do you always take your mobile phone with you when going out?\n4. Do you bring food or snacks with you when going out?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "21. Friends", "cue": "1. What do you and your friends do together?\n2. Are friends important to you?\n3. What do you value about your friends?\n4. Do you have a friend you have known for a long time?\n5. Where do you and your friends often meet?\n6. Do you prefer to spend time with one friend or with a group of friends?\n7. Would you invite friends to your home?\n8. Is there a difference between where you meet friends now and where you used to meet them in the past?\n9. Do you often go out with your friends?\n10. Why are some places suitable for meeting while others are not?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "22. Chatting", "cue": "1. Do you argue with friends?\n2. Do you prefer to chat with a group of people or with only one friend?\n3. Do you prefer to communicate face-to-face or via social media?\n4. Do you like chatting with friends?\n5. What do you usually chat about with your friends?"}, {"part": 1, "topic": "Sep 2025-Apr 2026", "text": "23. Staying with Old People", "cue": "1. Have you ever worked with old people?\n2. Are you happy to work with people who are older than you?\n3. What are the benefits of being friends with or working with old people?\n4. Do you enjoy spending time with old people?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "24. Animals and Pets", "cue": "1. What's your favourite animal?\n2. Have you ever had a pet?\n3. What's the most popular animal in your country?\n4. Where do you prefer to keep your pet, indoors or outdoors?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "25. Days Off", "cue": "1. When was the last time you had a few days off?\n2. What do you do when you have days off?\n3. What would you like to do if you had a day off tomorrow?\n4. Do you usually spend your days off with your parents or with your friends?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "26. Food", "cue": "1. What kinds of food do you particularly like?\n2. What kinds of food are most popular in your country?\n3. Is there any food you don't like?\n4. What kind of food did you like when you were young?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "27. Keys", "cue": "1. Have you ever locked yourself out?\n2. Do you think it's a good idea to leave your keys with a neighbour?\n3. Have you ever lost your keys?\n4. Do you always bring a lot of keys with you?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "28. Dreams", "cue": "1. Do you remember your dreams when you wake up?\n2. Do you think dreams will affect life?\n3. Do you think dreams have special meanings?\n4. Do you like hearing other people's dreams?\n5. Do you share your dreams with others?\n6. Do you want to make your dreams come true?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "29. Reading", "cue": "1. Do you like reading?\n2. What books do you like to read?\n3. What book did you read recently?\n4. What did you learn from it?\n5. Do you prefer to read on paper or on a screen?\n6. When do you need to read carefully, and when not?\n7. Do you prefer scanning or detailed reading?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "30. Gifts", "cue": "1. What kind of gifts are popular in your country?\n2. What's the best gift you have ever received?\n3. What do you give others as gifts?\n4. What gift have you received recently?\n5. How do we choose gifts?\n6. Do you think you are good at choosing gifts?\n7. Have you ever sent handmade gifts to others?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "31. Morning Time", "cue": "1. Do you like to get up early?\n2. What is your morning routine?\n3. What do you usually do in the morning?\n4. What did you do in the morning when you were little?\n5. Do you spend your mornings doing the same things on both weekends and weekdays?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "32. Hobby", "cue": "1. Do you have any hobbies?\n2. Do you have the same hobbies as your family members?\n3. Did you have any hobbies when you were a child?\n4. Do you have a hobby that you've had since childhood?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "33. Sports Teams", "cue": "1. Have you ever been part of a sports team?\n2. Are team sports popular in your culture?\n3. Do you like watching team games?\n4. What are the differences between team sports and individual sports?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "34. Typing", "cue": "1. Do you type on a desktop or laptop keyboard every day?\n2. When did you learn how to type on a keyboard?\n3. How do you improve your typing?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "35. Walking", "cue": "1. Do you walk a lot?\n2. Did you often go outside to have a walk when you were a child?\n3. Why do people like to walk in parks?\n4. Where would you like to take a long walk if you had the chance?\n5. Where have you gone for a walk lately?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "36. Buildings", "cue": "1. Do you take photos of buildings?\n2. Is there a building that you would like to visit?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "37. Views", "cue": "1. Do you like taking pictures of different views?\n2. Do you prefer views in urban areas or rural areas?\n3. Do you prefer views in your own country or in other countries?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "38. Scenery", "cue": "1. Do you like to take pictures of good scenery?\n2. Do you look out the window at the scenery when travelling by bus or car?\n3. Do you prefer the mountains or the sea?\n4. What are the most beautiful sights you have seen while travelling?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "39. Childhood Activities", "cue": "1. What did you enjoy doing as a child?\n2. Did you enjoy your childhood?\n3. Did you prefer to do activities alone or with a group of people when you were a child?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "40. Stages in Life", "cue": "1. How do people remember each stage of their lives?\n2. At what age do you think people are the happiest?\n3. Do you enjoy being the age you are now?\n4. What did you often do with your friends in your childhood?\n5. Do you have any plans for the next five years?\n6. What do you think is the most important thing at the moment?"}, {"part": 1, "topic": "Jan-Aug 2026", "text": "41. Daily Routine", "cue": "1. How do you organise your study time?\n2. What is your daily study routine?\n3. Do you ever change your plans?\n4. Have you ever changed your routine?\n5. What's your favourite time of the day?\n6. Do you go to sleep early or stay up late?\n7. Do you often stay up late?\n8. Do you think it's important to have a daily routine for your study?"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "1. Describe a place with a lot of trees that you would like to visit (for example, forest, oasis).", "cue": "You should say:\n- what park it is and where it is\n- how you know about it\n- why you want to go there\n- what it is like"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "2. Describe a friend of yours who is good at singing or music.", "cue": "You should say:\n- who this person is\n- where or when you listen to their singing or music\n- what kind of songs this person likes\n- how you feel when listening to their singing or music"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "3. Describe a wild animal that you want to know more about.", "cue": "You should say:\n- what it is\n- when you saw it\n- where you saw it\n- why you want to know more about it"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "4. Describe a good friend who is important to you.", "cue": "You should say:\n- who this person is, how long you've known each other\n- how you met each other\n- what you did together\n- explain why he or she is important to you"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "5. Describe an occasion when you lost your way.", "cue": "You should say:\n- where it was\n- what happened\n- how you felt\n- how you found your way"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "6. Describe a trip you would like to make again.", "cue": "You should say:\n- where you went\n- what you did there\n- who you went there with\n- why you'd like to make the trip again"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "7. Describe a natural talent that you want to improve.", "cue": "You should say:\n- what it is\n- when you discovered it\n- how you want to improve it\n- how you feel about it"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "8. Describe a person who runs a family business.", "cue": "You should say:\n- who this person is\n- what business this person does\n- what products it sells\n- what you have learned from this person"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "9. Describe a habit your friend has and you want to develop.", "cue": "You should say:\n- who your friend is, what habit your friend has\n- when you noticed this habit\n- why you want to develop this habit\n- how you will develop this habit"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "10. Describe an important old thing that your family has kept for a long time.", "cue": "You should say:\n- what it is\n- how your family first got this thing\n- how long your family has kept it\n- why this thing is important to your family"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "11. Describe a time when someone apologized to you.", "cue": "You should say:\n- who this person was, when this happened\n- why this person had to apologize to you\n- what this person said for apologizing\n- explain how you felt about the apology"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "12. Describe the first time when you used a foreign language to communicate.", "cue": "You should say:\n- where it happened\n- when it happened\n- who you talked to\n- how you felt about the conversation"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "13. Describe an exciting activity you tried for the first time.", "cue": "You should say:\n- what you did, when and where you did it\n- who you did it with\n- whether it was difficult or easy\n- why this activity was new or exciting for you"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "14. Describe a time you saw something interesting on social media.", "cue": "You should say:\n- when it was\n- where you saw it\n- what you saw\n- why it was interesting"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "15. Describe a book you read that you found useful.", "cue": "You should say:\n- what the book is and what it is about\n- why you read it\n- how you felt about it"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "16. Describe an area of science that interests you.", "cue": "You should say:\n- what science it is\n- how you got interested in it\n- how you learn this science\n- why this science is interesting to you"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "17. Describe a successful sportsperson you admire.", "cue": "You should say:\n- who this person is\n- what this person has achieved\n- how you know about this person\n- explain why you like this person"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "18. Describe a toy that you liked when you were a child.", "cue": "You should say:\n- what the toy was\n- who gave it to you\n- how you used this toy\n- explain how you felt when you got this toy"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "19. Describe a time you waited for something special.", "cue": "You should say:\n- what you were waiting for, how you felt\n- what you did while waiting\n- why you waited for it"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "20. Describe an interesting building you saw during a trip.", "cue": "You should say:\n- what it is\n- what it looks like\n- what it is used for now\n- what you learned there"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "21. Describe an important decision made with the help of other people.", "cue": "You should say:\n- what the decision was\n- why you made the decision\n- who helped you make the decision\n- how you felt about it"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "22. Describe a great dinner that you and your friends or family members enjoyed.", "cue": "You should say:\n- who organised this dinner, where you had\n- what you talked about during the meal\n- what you ate and drank\n- why you had this meal with your friends"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "23. Describe a creative person (artist, musician) you admire.", "cue": "You should say:\n- who this person is\n- how you know this person\n- what their greatest achievement is\n- why you think this person is creative"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "24. Describe a talk you gave to a group of people.", "cue": "You should say:\n- who you gave the speech to\n- what the speech was about\n- why you gave the speech\n- how you felt about the speech"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "25. Describe a water sport you want to try.", "cue": "You should say:\n- what the sport is\n- whether it will be easy or difficult\n- what you would have to do for it\n- why you want to do it"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "26. Describe a positive change that you have made recently in your daily routine.", "cue": "You should say:\n- what the change is and how you've made it\n- why you think it's a positive change\n- how you feel about the change"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "27. Describe a long journey you had.", "cue": "You should say:\n- where you went\n- who you had the journey with\n- why you had a long journey\n- how you felt about the journey"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "28. Describe a time when the electricity suddenly went off.", "cue": "You should say:\n- where and when it happened\n- how long it lasted\n- what you did during this time\n- how you felt about it"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "29. Describe an occasion when you received good service from a company or shop.", "cue": "You should say:\n- what company or business it was and what this company does\n- what the service was and who helped you\n- where you received this good service\n- why you think it was good service"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "30. Describe a time when you broke something.", "cue": "You should say:\n- what it was\n- when and where it happened\n- how you broke it\n- what you did after that"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "31. Describe an interesting traditional story.", "cue": "You should say:\n- what it is about\n- how you knew it, who told you the story\n- how you felt when you first heard it"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "32. Describe an invention that is useful in your daily life.", "cue": "You should say:\n- what it is\n- how it changed the world\n- how popular it is"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "33. Describe a natural place (for example, park, mountains).", "cue": "You should say:\n- what park it is and where it is\n- how you know about it\n- why you want to go there\n- what it is like"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "34. Describe a popular person.", "cue": "You should say:\n- who this person is, how this person became famous\n- how you know this person\n- why you think this person is interesting"}, {"part": 2, "topic": "Sep 2025-Apr 2026", "text": "35. Describe an unusual meal you had.", "cue": "You should say:\n- when it happened\n- where you ate it\n- how you felt about it"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "36. Describe a film you watched recently that you felt disappointed about.", "cue": "You should say:\n- what it was\n- why you decided to watch it\n- why it made you disappointed"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "37. Describe a family member that did something that made you feel proud.", "cue": "You should say:\n- who this person is\n- what this person did\n- why you felt proud of them"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "38. Describe your perfect job.", "cue": "You should say:\n- what it is\n- how you can get this job\n- what kinds of work you would do for the job\n- explain why you want to have it"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "39. Describe an experience when you were not allowed to use a mobile phone.", "cue": "You should say:\n- what you did\n- when it was\n- where it was\n- why you were not allowed to use a mobile phone"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "40. Describe a famous person you'd like to meet.", "cue": "You should say:\n- who this person is\n- where you'd like to meet this person\n- how you know this person\n- why you'd like to meet this person"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "41. Describe a place in your home where you like to relax.", "cue": "You should say:\n- where it is\n- what it is like\n- what you like doing there\n- why you feel relaxed there"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "42. Describe something you can't live without (not a computer or phone).", "cue": "You should say:\n- what it is\n- how you use it\n- how often you use it\n- how it helps you and why you can't live without it"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "43. Describe an occasion when you saw a lot of people smiling.", "cue": "You should say:\n- what occasion it was\n- where it was\n- why they were smiling"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "44. Describe a time when you gave advice to others.", "cue": "You should say:\n- who you gave advice to\n- what the situation was\n- what advice you gave\n- what the result was"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "45. Describe an app or program in your computer or phone.", "cue": "You should say:\n- what app or program it is\n- when and where you found it\n- how you use it\n- how you feel about it"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "46. Describe a country in which you would like to work or live for a short period of time.", "cue": "You should say:\n- what country or city it is\n- how you know about it\n- what type of work you would like to do there\n- why you would like to work in this country"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "47. Describe an important old thing that your family has kept for a long time.", "cue": "You should say:\n- what it is\n- how your family first got this thing\n- how long your family has kept it\n- why this thing is important to your family"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "48. Describe a long bike, motorbike, or car trip that you would like to take.", "cue": "You should say:\n- when you want to go\n- where you want to go\n- how long it will take you\n- why it is interesting"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "49. Describe a shop you often visit.", "cue": "You should say:\n- what shop it is, where it is\n- what it sells\n- why you like it"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "50. Describe a time you needed to use your imagination.", "cue": "You should say:\n- what you did using imagination\n- when it was\n- whether it was easy or difficult\n- how you felt"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "51. Describe a film you watched and enjoyed.", "cue": "You should say:\n- what the film was about\n- when and where you watched it\n- why you liked it and why you want to watch it again"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "52. Describe a story you read recently.", "cue": "You should say:\n- what it is about\n- when you read it\n- whether you liked it\n- what you learned from it"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "53. Describe a person who solved a problem in a smart way.", "cue": "You should say:\n- who this person is\n- what the problem was\n- what solution they gave\n- why you think it was a clever solution"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "54. Describe a person who encouraged you to protect the nature.", "cue": "You should say:\n- who this person is\n- how this person encouraged you\n- what this person encouraged you to do\n- how you feel about this person"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "55. Describe an occasion when you paid more than expected.", "cue": "You should say:\n- what you bought\n- how much you paid\n- why you bought it\n- why you paid more"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "56. Describe a person who often helps others.", "cue": "You should say:\n- who this person is\n- how you know this person\n- how this person helps you\n- why you think this person is helpful"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "57. Describe a piece of technology (not a phone) that you would like to own.", "cue": "You should say:\n- what it is\n- how you knew it\n- how much it costs\n- why you'd like to own it"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "58. Describe a music event that you didn't enjoy.", "cue": "You should say:\n- what it was\n- who you went with\n- why you went there\n- why you didn't like it"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "59. Describe a time when you encouraged someone to do something that they didn't want to do.", "cue": "You should say:\n- who this person is\n- what you encouraged them to do\n- how this person reacted\n- why you encouraged this person to do it"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "60. Describe one of your friends who learned something new (not from a teacher).", "cue": "You should say:\n- who this person is\n- what this person learned\n- why they learned it\n- whether it would be easier to learn from a teacher"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "61. Describe a person who makes plans a lot and is good at planning.", "cue": "You should say:\n- who this person is\n- how you knew this person\n- what plans this person makes\n- how you feel about this person"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "62. Describe a child who loves drawing or painting.", "cue": "You should say:\n- who this child is\n- how you knew him or her\n- how often he or she draws or paints\n- why he or she likes drawing or painting"}, {"part": 2, "topic": "Jan-Aug 2026", "text": "63. Describe a quiet place that you like to go to.", "cue": "You should say:\n- what place it is\n- how often you go there, when you go there\n- what you do there\n- why you like this place"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "1. Parks, Nature", "cue": "1. Why do people like visiting places with trees or forests?\n2. Why is it important to have parks in the city?\n3. What benefits can a park bring to a city?\n4. Are natural views better than city views?\n5. Do all people need some nature?\n6. Are people hard-wired to protect the environment?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "2. Music", "cue": "1. Do you think the government should invest more money in concerts?\n2. Should every child learn to play a musical instrument?\n3. What are the benefits of children learning a musical instrument?\n4. What kinds of music do you like to listen to?\n5. What kinds of music are most popular in your country?\n6. What kind of music do people like at different ages?\n7. Is it necessary for the government to require all children to learn music?\n8. Do you think music lessons are important?\n9. Do you think music is beneficial for children at school?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "3. Wild Animals", "cue": "1. Why are some people more willing to protect wild animals than others?\n2. Should parents take their children to the zoo to see wild animals?\n3. Why do you think wild animals should be protected?\n4. Do you think animals are important?\n5. Are there any wild animals in the city?\n6. Do you think it's a good idea to let animals stay in local parks for people to see?\n7. Is it more important to protect wild animals or the environment?\n8. Should people educate children to protect wild animals?\n9. Why do some people attach more importance to protecting RARE animals?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "4. Friendship", "cue": "1. Do you think it is better for children to have a few close friends or many casual friends?\n2. Do you think a child's relationship with friends can be replaced by that with other people, like parents or other family members?\n3. Is it possible for managers to be friends with their workers?\n4. How do children make friends at school?\n5. What are the differences between friends made inside and outside the workplace?\n6. How do children make friends when they are not at school?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "5. Getting Lost, Maps", "cue": "1. Why do some people get lost more easily than others?\n2. Do you think it is important to be able to read a map?\n3. How can people find their way when they are lost?\n4. Do you think that children should be taught to read paper maps at school?\n5. Are paper maps still necessary?\n6. How do people react when they get lost?\n7. Do you think it's important to do some preparation before you travel to new places?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "6. Travelling", "cue": "1. What do you need to do before you travel?\n2. What preparations should people make before going on holiday?\n3. Why do people like travelling?\n4. What would happen if no preparation were made before the trip?\n5. Why do some people prefer to travel in their own country rather than going abroad?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "7. Talents", "cue": "1. Do you think it's more interesting to watch famous people's or ordinary people's shows?\n2. Is it possible for us to know that children who are 3 or 4 years old will become musicians and painters when they grow up?\n3. Do you think artists with talents should focus on their talents?\n4. Why do people like to watch talent shows?\n5. Is it easy to identify children's talents?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "8. Business", "cue": "1. Is it good to work with family members?\n2. Would you like to start a family business?\n3. What are the advantages and disadvantages of family businesses?\n4. What kinds of family businesses are common in your country?\n5. What makes a successful family business?\n6. Why do some people open their own business?\n7. What are the drawbacks of working in a family-owned company?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "9. Habits", "cue": "1. Why do we develop bad habits?\n2. What can we do to get rid of bad habits?\n3. Do you think a person's good habits would influence those around him or her? How?\n4. What habits should children have?\n5. What should parents do to teach their children good habits?\n6. Why do some habits change when people get older, and how do people change their habits?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "10. Old Things", "cue": "1. What are the differences between the things old people keep and those young people keep?\n2. What are the differences between the things that people keep today and the things that people kept in the past?\n3. Do you think that keeping old things in a family is a great way to connect with the past?\n4. Why do grown-ups hate to throw away old things?\n5. As well as family photographs, what are some other things that people keep in their family for a long time?\n6. In your culture, what sorts of things do people pass down from generation to generation?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "11. Saying \"Sorry\"", "cue": "1. Is it important to say sorry?\n2. In what situations do people say sorry?\n3. Should people apologise for anything wrong they do?\n4. Why do some people hate to say sorry?\n5. Do you think people often say 'sorry' when they don't really mean it?\n6. Do you think every 'sorry' is from the bottom of the heart?\n7. Do people in your country like to say 'sorry'?\n8. Are women better than men at recognizing emotions?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "12. Languages", "cue": "1. Will minority languages disappear in the future?\n2. Does one's age affect their language learning?\n3. At what age should children start learning a foreign language?\n4. Which skill is more important, speaking or writing?\n5. Does a person still need to learn other languages, if he or she is good at English?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "13. New Things, Dangerous Things", "cue": "1. Why do people like doing dangerous things?\n2. Why do some people enjoy extreme sports?\n3. Why are some people afraid of trying (or unwilling to try) new things?\n4. Do you think fear stops people from trying new things?\n5. Do you think that children adapt to new things more easily than adults?\n6. What can people learn from doing dangerous activities?\n7. What are the benefits of trying new things?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "14. Social Media", "cue": "1. What are the advantages and disadvantages of using social media?\n2. Does social media influence people's lives?\n3. Why do people like using social media?\n4. What kind of things are popular on social media?\n5. Is it easy to find real friends on a social networking website?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "15. Reading", "cue": "1. Which is better, paper books or e-books?\n2. What should the government do to make libraries better?\n3. Do you think old people spend more time reading than young people?\n4. Have libraries changed a lot with the development of the Internet?\n5. What should we do to prevent modern libraries from closing down?\n6. What are the types of books that young people like to read?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "16. Science", "cue": "1. Should scientists explain the research process to the public?\n2. How do you find out about scientific news?\n3. Should people continue studying science after finishing school?\n4. Why do some children not like learning science at school?\n5. Do you think science is important?\n6. How does science influence our life?\n7. Should children learn science?\n8. What science subject is the most important for children to learn?\n9. Which area of science is the most important in the last one hundred years?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "17. Athletes, Sports", "cue": "1. Is it easy to identify children's talents?\n2. Is talent important in sports?\n3. What characteristics do you think an athlete should have?\n4. Why are there so few top athletes?\n5. What kind of sports are popular in your country?\n6. What is the most popular sport in your country?\n7. Should students have physical education and do sports at school?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "18. Toys, Kids and Ads", "cue": "1. How does advertising influence children?\n2. Do you think advertising that targets children should be banned?\n3. What toys are popular with boys and girls in your country now?\n4. What's the difference between the toys kids play now and those they played in the past?\n5. Do you think parents should buy more toys for their kids or spend more time with them?\n6. What are the advantages and disadvantages of modern toys?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "19. Waiting and Patience", "cue": "1. Why are some people unwilling to wait?\n2. What are the daily experiences that people have to wait for?\n3. On what occasions do people usually need to wait?\n4. Who behaves better when waiting, a child or an adult?\n5. What are the positive and negative effects of waiting on society?\n6. Where do children learn to be patient, at home or at school?\n7. Compared to the past, are people more patient now?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "20. Scenic Spots, Buildings", "cue": "1. Should all scenic spots charge an entry fee?\n2. Is visiting scenic spots the best choice for us while travelling?\n3. Why do some people like to live in big cities?\n4. Is it necessary for tourists to visit landmarks when travelling in a place?\n5. Which do most people prefer, living in a bungalow or in a tall building?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "21. Making Decisions", "cue": "1. What kind of decisions do you think are meaningful?\n2. What important decisions should be made by teenagers themselves?\n3. Why are some people unwilling to make quick decisions?\n4. Do people like to ask for advice about their personal life or their work?\n5. Why do people like to ask others for advice?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "22. Eating Out, Food", "cue": "1. Why is it important to share food with others during a celebration?\n2. Do you like to cook at home?\n3. Is it a hassle to prepare a meal at home?\n4. Do people prefer to eat out at restaurants or eat at home on special occasions?\n5. What food do you eat on special occasions?\n6. People are spending less and less time having meals with their families these days. Is this good or bad?\n7. What do people talk about during meals?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "23. Creativity, Inspiration", "cue": "1. Do you think visual media (film, photography) is important in how news is presented?\n2. Should every child learn to play a musical instrument?\n3. What are the benefits of children learning a musical instrument?\n4. What can schools do to nurture children's creativity?\n5. Do you think art (drawing) can make a person more creative?\n6. How do artists acquire inspiration?\n7. What kind of jobs require creativity?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "24. Communication, Speeches", "cue": "1. What benefits does the Internet bring to communication?\n2. What personal qualities does a good communicator need to have?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "25. Swimming, Water, Water Transportation", "cue": "1. What do you think of people who waste water?\n2. What are the characteristics of goods transported by water?\n3. What are the pluses and minuses of transporting goods on water?\n4. Are rivers and lakes good for transport?\n5. Why do people like to live near water?\n6. What water sports are popular in your country?\n7. Why do people like water sports?\n8. Is being able to swim important?\n9. Do you think it's good to teach swimming in schools?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "26. Changes, Daily Routine", "cue": "1. What do people normally plan in their daily lives?\n2. Is time management important in our daily lives?\n3. What changes do people often make?\n4. Who would make changes more often, young people or old people?\n5. Is it good for people to change jobs frequently?\n6. Who should get more promotion opportunities in the workplace, young people or older people?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "27. Travelling, Long Journeys", "cue": "1. What are the differences between group travelling and travelling alone?\n2. What do we need to prepare for a long journey?\n3. What is good and bad about travelling by plane?\n4. Why do some people prefer to travel in their own country rather than going abroad?\n5. Why do people choose to travel or live abroad?\n6. Why are more and more young people going on long trips nowadays?\n7. Why do some people prefer long journeys?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "28. Electricity, Electric Vehicles", "cue": "1. Do people use more electricity now than before?\n2. How did people manage to live without electricity in the ancient world?\n3. Which is better, electric bicycles or ordinary bicycles?\n4. Do you think electric bicycles will replace ordinary bicycles in the future?\n5. Which is better, electric cars or petrol cars?\n6. Is it difficult for the government to replace all the petrol cars with electric cars?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "29. Shopping, Service", "cue": "1. What are the benefits and drawbacks of consumerism for a country's economy?\n2. What are the advantages and disadvantages of shopping at a big shopping centre?\n3. What makes large shopping malls so popular?\n4. What are the differences between shopping online and in-store?\n5. What do you think are the pros and cons of shopping online?\n6. Are small shops important?\n7. What are the advantages and disadvantages of shopping in small shops?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "30. Fixing Things, Handmade Items", "cue": "1. Do you think handmade clothes are more valuable?\n2. Do you think clothes produced in the factory are of better quality than those made by hand?\n3. What kind of people like to fix things by themselves?\n4. Is the older generation better at fixing things?\n5. What kind of things are more likely to be broken by people at home?\n6. Do you think elderly people should teach young people to fix things?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "31. Stories", "cue": "1. What kind of stories do children like to listen to?\n2. What can a child learn from a story?\n3. Why do most children like listening to stories before bedtime?\n4. What are the benefits of bedtime stories for children?\n5. Is a good storyline important for a movie?\n6. Do all stories for children have happy endings?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "32. Inventions", "cue": "1. Do all inventions bring benefits to our world?\n2. Who should support and sponsor inventors, governments or private companies?\n3. What are the qualities of a scientist (or inventor)?\n4. What do you think have been some of the most important inventions in the past 100 years or so?\n5. Are there any other inventions that make the world better?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "33. Natural Places", "cue": "1. What kind of people like to visit natural places?\n2. What are the differences between a natural place and a city?\n3. Do you think that going to the park is the only way to get closer to nature?\n4. What can people gain from going to natural places?\n5. Do you think it's a good idea to let animals stay in local parks for people to see?\n6. Are there any wild animals in the city?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "34. Popularity", "cue": "1. Why are some students popular in school?\n2. Is it important for a teacher to be popular?\n3. Do you think good teachers are always popular among students?\n4. What are the qualities of being a good teacher?\n5. Is it easier to become popular nowadays?\n6. Why do people want to be popular?"}, {"part": 3, "topic": "Sep 2025-Apr 2026", "text": "35. Restaurants", "cue": "1. What are the advantages and disadvantages of eating at a restaurant?\n2. What fast food restaurants are there const cnt = p => QUESTIONS.filter(q=>q.part===p).length;
$('n1').textContent=cnt(1); $('n2').textContent=cnt(2); $('n3').textContent=cnt(3); $('nt').textContent=QUESTIONS.length;
function logLine(m,c){ const d=document.createElement('div'); if(c)d.className=c; d.textContent=m; $('log').appendChild(d); $('log').scrollTop=$('log').scrollHeight; }
$('go').addEventListener('click', async ()=>{
  if($('key').value.trim()!==TEACHER_KEY){ logLine('Wrong teacher key.','err'); return; }
  $('go').disabled=true; $('log').innerHTML=''; logLine('Loading existing questions...');
  let existing=new Set();
  try{
    const snap=await getDocs(ref);
    snap.forEach(d=>{ const t=(d.data().text||'').trim().toLowerCase(); if(t) existing.add(t); });
    logLine('Found '+existing.size+' questions already in the app.');
  }catch(e){ logLine('Could not read existing: '+(e.code||e.message),'err'); $('go').disabled=false; return; }
  let added=0, skipped=0; const base=Date.now();
  for(let i=0;i<QUESTIONS.length;i++){
    const q=QUESTIONS[i];
    if(existing.has(q.text.trim().toLowerCase())){ skipped++; }
    else{
      try{ await addDoc(ref,{ part:q.part, topic:q.topic, text:q.text, cue:q.cue||'', teacher:"Maqsudjon's", timestamp: base + (QUESTIONS.length - i) }); added++; }
      catch(e){ logLine('Failed: '+q.text.slice(0,40)+' - '+(e.code||e.message),'err'); }
    }
    $('bar').style.width=Math.round(((i+1)/QUESTIONS.length)*100)+'%';
  }
  logLine('Done. Added '+added+', skipped '+skipped+' (already present).','ok');
  logLine('Open the Speaking Lab -> questions are live (QUESTIONS view). You can delete this page now.');
  $('go').disabled=false; $('go').textContent='Import again';
});
